# WebSocket / Connection upgrade map (needed even if we don't use WebSockets;
# prevents nginx forwarding "keep-alive" to Uvicorn which doesn't support it)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTP — redirect everything to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Let Certbot HTTP-01 challenge through
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — main server block
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name yourdomain.com www.yourdomain.com;

    # TLS — Certbot fills these in automatically on first run
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers (transport-level; app also sends most of these)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    nosniff                                         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;

    client_max_body_size 2M;

    access_log /var/log/nginx/waterlevels_access.log;
    error_log  /var/log/nginx/waterlevels_error.log warn;

    # Static files — served by Nginx directly, never hits Python
    location /static/ {
        alias /opt/waterlevels/app/static/;
        expires 7d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    location = /favicon.ico {
        alias /opt/waterlevels/app/static/favicon.ico;
        access_log off;
        log_not_found off;
    }

    # Application — proxy to Uvicorn
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
    }
}
