{% extends "base.html" %}

{% block title %}Page Not Found — Nero{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto px-4 py-24 text-center">
    <p class="text-8xl font-black text-slate-200 mb-4">404</p>
    <h1 class="text-2xl font-bold text-slate-800 mb-2">{{ _("Page Not Found") }}</h1>
    <p class="text-slate-500 mb-8">
        {{ _("The page you're looking for doesn't exist, or the dam name is incorrect.") }}
    </p>
    <a href="/"
       class="inline-block px-6 py-3 bg-blue-600 text-white rounded-xl font-medium
              hover:bg-blue-700 active:scale-95 transition-all duration-75">
        {{ _("← Back to Dashboard") }}
    </a>
</div>
{% endblock %}
